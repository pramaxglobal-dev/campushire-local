version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campushire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: campushire_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campushire"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campushire-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campushire-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://campushire:${POSTGRES_PASSWORD:-password}@postgres:5432/campushire_db
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai:8000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - campushire-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    networks:
      - campushire-network

  ai:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://campushire:${POSTGRES_PASSWORD:-password}@postgres:5432/campushire_db
    env_file:
      - apps/ai/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - campushire-network

volumes:
  postgres-data:
  redis-data:

networks:
  campushire-network:
    driver: bridge
